version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hr_platform_db
      POSTGRES_USER: hr_admin
      POSTGRES_PASSWORD: moya_hr123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hr_platform_db
      SPRING_DATASOURCE_USERNAME: hr_admin
      SPRING_DATASOURCE_PASSWORD: moya_hr123
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: